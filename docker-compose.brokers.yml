services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: shopsystem-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.9
    container_name: shopsystem-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"

  redis:
    image: redis:7-alpine
    container_name: shopsystem-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
