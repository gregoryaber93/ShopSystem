services:
  postgres:
    image: postgres:16
    container_name: userservice-postgres
    environment:
      POSTGRES_DB: user_service_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5442:5432"
    networks:
      - userservice-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  userservice-api:
    container_name: userservice-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5300:8080"
    networks:
      - userservice-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=user_service_dev;Username=postgres;Password=postgres
      InternalApi__ApiKey: shopsystem-internal-dev-key
      MessageBrokers__RabbitMq__Host: host.docker.internal
      MessageBrokers__RabbitMq__Port: 5672
      MessageBrokers__RabbitMq__Username: guest
      MessageBrokers__RabbitMq__Password: guest
      MessageBrokers__RabbitMq__Exchange: AuthService.exchange
      MessageBrokers__RabbitMq__UserCreatedRoutingKey: users.created.v1
      MessageBrokers__RabbitMq__UserCreatedQueue: userservice.users.created.v1
    depends_on:
      - postgres

volumes:
  postgres-data:

networks:
  userservice-network:
