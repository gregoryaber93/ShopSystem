services:
  postgres:
    image: postgres:16
    container_name: userservice-postgres
    environment:
      POSTGRES_DB: user_service_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5442:5432"
    networks:
      - userservice-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  userservice-api:
    container_name: userservice-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5300:8080"
    networks:
      - userservice-network
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=user_service_dev;Username=postgres;Password=postgres
    depends_on:
      - postgres

volumes:
  postgres-data:

networks:
  userservice-network:
