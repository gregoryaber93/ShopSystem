syntax = "proto3";

option csharp_namespace = "ShopService.Contracts.Grpc.Products";

package ShopService.products.v1;

service ProductsGrpc {
  rpc GetProductById (GetProductByIdRequest) returns (ProductDto);
}

message GetProductByIdRequest {
  string product_id = 1;
}

message ProductDto {
  string product_id = 1;
  string name = 2;
  string sku = 3;
}