services:
  postgres:
    image: postgres:16
    container_name: productservice-postgres
    environment:
      POSTGRES_DB: product_service_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    networks:
      - productservice-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  productservice-api:
    container_name: productservice-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5294:8080"
    networks:
      - productservice-network
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=product_service_dev;Username=postgres;Password=postgres
    depends_on:
      - postgres

volumes:
  postgres-data:

networks:
  productservice-network:
