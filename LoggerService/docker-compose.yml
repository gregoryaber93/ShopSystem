services:
  loggerservice-api:
    container_name: loggerservice-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5299:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      MessageBrokers__KafkaConsumers__BootstrapServers: host.docker.internal:9092
      MessageBrokers__KafkaConsumers__GroupId: logger-audit-v1

