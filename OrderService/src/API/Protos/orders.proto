syntax = "proto3";

option csharp_namespace = "ShopSystem.Contracts.Grpc.Orders";

package shopsystem.orders.v1;

import "google/protobuf/timestamp.proto";

service OrdersGrpc {
  rpc GetOrderById (GetOrderByIdRequest) returns (GetOrderByIdResponse);
}

message GetOrderByIdRequest {
  string order_id = 1;
}

message OrderDto {
  string order_id = 1;
  string user_id = 2;
  string shop_id = 3;
  string product_id = 4;
  int32 quantity = 5;
  double unit_price = 6;
  double total_price = 7;
  google.protobuf.Timestamp ordered_at_utc = 8;
  string status = 9;
}

message GetOrderByIdResponse {
  bool found = 1;
  OrderDto order = 2;
}
