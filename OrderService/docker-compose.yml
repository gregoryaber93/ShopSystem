services:
  postgres:
    image: postgres:16
    container_name: orderservice-postgres
    environment:
      POSTGRES_DB: order_service_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    networks:
      - orderservice-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  orderservice-api:
    container_name: orderservice-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5297:8080"
    networks:
      - orderservice-network
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=order_service_dev;Username=postgres;Password=postgres
    depends_on:
      - postgres

volumes:
  postgres-data:

networks:
  orderservice-network:
