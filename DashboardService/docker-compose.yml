services:
  dashboardservice-api:
    container_name: dashboardservice-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5300:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      MessageBrokers__KafkaConsumers__BootstrapServers: host.docker.internal:9092
      MessageBrokers__KafkaConsumers__GroupId: dashboard-projections-v1



