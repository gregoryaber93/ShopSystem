services:
  postgres:
    image: postgres:16
    container_name: authenticationservice-postgres
    environment:
      POSTGRES_DB: authentication_service_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    networks:
      - authenticationservice-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  authenticationservice-api:
    container_name: authenticationservice-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5294:8080"
    networks:
      - authenticationservice-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=authentication_service_dev;Username=postgres;Password=postgres
      UserService__BaseUrl: http://host.docker.internal:5300
      UserService__GrpcAddress: http://host.docker.internal:5300
      UserService__InternalApiKey: shopsystem-internal-dev-key
      MessageBrokers__RabbitMq__Host: host.docker.internal
      MessageBrokers__RabbitMq__Port: 5672
      MessageBrokers__RabbitMq__Username: guest
      MessageBrokers__RabbitMq__Password: guest
      MessageBrokers__RabbitMq__Exchange: AuthService.exchange
      MessageBrokers__RabbitMq__UserCreatedRoutingKey: users.created.v1
      MessageBrokers__RabbitMq__DeadLetterExchange: AuthService.exchange.dlq
      Outbox__PollIntervalSeconds: 10
      Outbox__BatchSize: 25
      Outbox__MaxRetries: 10
    depends_on:
      - postgres

volumes:
  postgres-data:

networks:
  authenticationservice-network:
