services:
  postgres:
    image: postgres:16
    container_name: authservice-postgres
    environment:
      POSTGRES_DB: authentication_service_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    networks:
      - authservice-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

