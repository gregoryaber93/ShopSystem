services:
  postgres:
    image: postgres:16
    container_name: authenticationservice-postgres
    environment:
      POSTGRES_DB: authentication_service_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    networks:
      - authenticationservice-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

