syntax = "proto3";

option csharp_namespace = "ShopSystem.Contracts.Grpc.AuthIdentity";

package shopsystem.authidentity.v1;

service AuthIdentityGrpc {
  rpc ProvisionUser (ProvisionUserRequest) returns (ProvisionUserResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);
}

message ProvisionUserRequest {
  string email = 1;
  string password = 2;
  repeated string roles = 3;
}

message ProvisionUserResponse {
  string user_id = 1;
  string email = 2;
  repeated string roles = 3;
}

message UpdateUserRequest {
  string user_id = 1;
  string email = 2;
  repeated string roles = 3;
  optional string password = 4;
}

message UpdateUserResponse {
  string user_id = 1;
  string email = 2;
  repeated string roles = 3;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {
}
